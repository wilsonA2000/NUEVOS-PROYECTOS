version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: verihome_db_prod
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    # SIN ports: Postgres solo accesible dentro de la red de compose.
    # Nunca exponer 5432 al host en producción.
    networks:
      - verihome_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Celery Broker
  redis:
    image: redis:7-alpine
    container_name: verihome_redis_prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    # SIN ports: Redis solo accesible dentro de la red de compose.
    # Nunca exponer 6379 al host en producción.
    networks:
      - verihome_network
    healthcheck:
      # Con --requirepass, "redis-cli ping" sin -a devuelve NOAUTH y el
      # healthcheck nunca pasa → el backend (depends_on service_healthy)
      # no arrancaría. Igual que el compose.local.
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: verihome_backend_prod
    restart: always
    # Sin command: el entrypoint hace migrate + collectstatic + superuser
    # + gunicorn. SOLO el backend migra (los demás servicios pasan su
    # command y el entrypoint se salta el setup).
    # Todo el entorno (EMAIL_*, SENTRY_DSN, MAPBOX, SECURE_*, CSRF/CORS,
    # BIOMETRIC_*, WOMPI_*, etc.) viene del .env.prod completo. Antes se
    # listaban a mano y faltaba la mitad → settings caía a defaults (D37).
    env_file: .env.prod
    environment:
      # DEBUG nunca se activa en prod, pase lo que pase en el .env.
      - DEBUG=False
      # Hostnames internos de la red de compose (pisan los del .env).
      - DATABASE_HOST=db
      # Sin sufijo /N: settings le añade /4 (channels), /2 (cache)…; un /1
      # aquí produciría rutas tipo …/1/4 (bug de Fase 3, ver compose.local).
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    # SIN ports: gunicorn solo se alcanza por nginx dentro de la red.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - verihome_network

  # Daphne WebSocket Server
  daphne:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: verihome_daphne_prod
    restart: always
    command: daphne -b 0.0.0.0 -p 8001 verihome.asgi:application
    # env_file completo: daphne también necesita BIOMETRIC_* y el resto
    # (antes solo recibía DB/Redis → settings incompletos en el WS).
    env_file: .env.prod
    environment:
      - DEBUG=False
      - DATABASE_HOST=db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    # SIN ports: daphne solo se alcanza por nginx dentro de la red.
    depends_on:
      - db
      - redis
    networks:
      - verihome_network

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: verihome_celery_worker_prod
    restart: always
    command: celery -A verihome worker -l info --concurrency=4
    env_file: .env.prod
    environment:
      - DEBUG=False
      - DATABASE_HOST=db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - verihome_network

  # Celery Beat Scheduler
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: verihome_celery_beat_prod
    restart: always
    command: celery -A verihome beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env.prod
    environment:
      - DEBUG=False
      - DATABASE_HOST=db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - verihome_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: verihome_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # static/media van en /srv — NO anidados bajo el bind read-only de
      # la SPA (docker no puede crear mountpoints dentro de un mount ro).
      - static_volume:/srv/static:ro
      - media_volume:/srv/media:ro
      # El build de Vite vive en staticfiles/frontend (outDir), NO en
      # frontend/dist (path viejo que dejaba nginx sirviendo un dir vacío).
      - ./staticfiles/frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - daphne
    networks:
      - verihome_network

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  verihome_network:
    driver: bridge
