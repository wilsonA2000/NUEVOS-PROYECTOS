name: Deploy to VPS

# Despliegue manual a VPS Colombia.
# Trigger SOLO manual (workflow_dispatch) hasta que se confirme infraestructura.
# Pasos típicos: SSH al host → git pull → migrate → collectstatic → restart
# servicios (gunicorn + daphne + celery + nginx). Las credenciales viven
# como GitHub Actions secrets — NO embeberlas en este archivo.
#
# Secrets requeridos antes de habilitar:
#   - VPS_HOST         dominio o IP del servidor (ej. verihome.co)
#   - VPS_USER         usuario SSH (ej. deploy)
#   - VPS_SSH_KEY      private key OpenSSH (sin passphrase o con secret separado)
#   - VPS_DEPLOY_PATH  ruta absoluta del repo en el VPS (ej. /srv/verihome)
#
# Para activar:
#   1. Configurar los 4 secrets en Settings → Secrets and variables → Actions.
#   2. Confirmar que el deploy environment existe en Settings → Environments.
#   3. Quitar el `if: false` del job `deploy` más abajo.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno objetivo'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_migrations:
        description: 'Saltar migrate (úsalo solo si la BD ya está al día)'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    # Gate de seguridad — quitar cuando el VPS esté listo.
    if: false
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 20

    steps:
      - name: Checkout (sólo para tener el SHA en logs)
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Añadir host a known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          SKIP_MIGRATIONS: ${{ inputs.skip_migrations }}
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash -se <<'EOF'
            set -euo pipefail
            cd "$DEPLOY_PATH"

            echo "[deploy] git fetch + checkout main"
            git fetch --all --prune
            git reset --hard origin/main

            echo "[deploy] activar venv + actualizar dependencias"
            source venv/bin/activate
            pip install -q --upgrade pip
            pip install -q -r requirements.txt

            if [ "$SKIP_MIGRATIONS" != "true" ]; then
              echo "[deploy] migrar BD"
              python manage.py migrate --noinput
            fi

            echo "[deploy] collectstatic"
            python manage.py collectstatic --noinput

            echo "[deploy] rebuild frontend"
            cd frontend
            npm ci --no-audit --no-fund
            npm run build
            cd ..

            echo "[deploy] reiniciar servicios (systemd)"
            sudo systemctl restart verihome-gunicorn verihome-daphne verihome-celery
            sudo systemctl reload nginx

            echo "[deploy] healthcheck"
            curl -fsS "https://${{ secrets.VPS_HOST }}/api/v1/" >/dev/null && echo "OK"
          EOF

      - name: Notificar resultado
        if: always()
        run: |
          echo "Deploy ${{ inputs.environment }} terminado con status ${{ job.status }}"
