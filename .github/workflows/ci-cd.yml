name: VeriHome CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # Job 1: Backend Tests
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verihome_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: 'True'
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: verihome_test
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      REDIS_URL: redis://localhost:6379
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      FRONTEND_URL: http://localhost:5173
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "setuptools<81"

    - name: Run migrations
      run: python manage.py migrate --noinput

    - name: Run Django tests
      run: python manage.py test --parallel --keepdb
      continue-on-error: true

  # Job 2: Frontend Tests
  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run frontend linting
      working-directory: ./frontend
      run: npx eslint src --ext ts,tsx --report-unused-disable-directives || true

    - name: Run frontend tests
      working-directory: ./frontend
      run: npm run test:coverage || true

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

  # Job 3: Security Scanning
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Run Bandit security scan
      run: |
        pip install bandit
        bandit -r . -x ./venv/,./frontend/,./node_modules/,./.git/ -ll -f json -o bandit-report.json || true

    - name: Run pip-audit check
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt --desc || true

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: bandit-report.json

  # Job 4: Database Migration Check
  migration-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verihome_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: 'True'
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: verihome_test
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "setuptools<81"

    - name: Run migrations
      run: python manage.py migrate --noinput

    - name: Check for missing migrations
      run: python manage.py makemigrations --check || true

  # Job 5: Dependency Security Check
  dependency-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Python dependency audit
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt --desc || true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Frontend dependency check
      working-directory: ./frontend
      run: npm audit --audit-level=critical || true

  # Job 6: Performance Tests (only when backend and frontend pass)
  performance-test:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verihome_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: 'False'
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: verihome_test
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      REDIS_URL: redis://localhost:6379
      FRONTEND_URL: http://localhost:5173
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "setuptools<81"
        pip install locust

    - name: Run migrations
      run: python manage.py migrate --noinput

    - name: Start Django server
      run: |
        python manage.py runserver 8000 &
        sleep 10

    - name: Run performance tests
      run: |
        locust -f performance_tests/locustfile.py --headless -u 10 -r 2 -t 60s --host=http://localhost:8000
      continue-on-error: true

  # Job 7: Deploy (only on main, after all checks pass)
  # T_AUDIT.3 · E2E Playwright contra backend real en cada PR
  test-e2e-playwright:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verihome_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      SECRET_KEY: e2e-test-secret-key-please-change
      DEBUG: 'True'
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: verihome_e2e
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      REDIS_URL: redis://localhost:6379
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      FRONTEND_URL: http://localhost:5173
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      VITE_API_URL: http://localhost:8000/api/v1
      PLAYWRIGHT_BASE_URL: http://localhost:5173

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Apply database migrations
      run: python manage.py migrate --noinput

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build frontend (para servirlo estático si falla dev server)
      working-directory: ./frontend
      run: npm run build

    - name: Install Playwright browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps chromium

    - name: Start Django server in background
      run: |
        nohup python manage.py runserver 0.0.0.0:8000 > /tmp/django.log 2>&1 &
        echo $! > /tmp/django.pid
        # Esperar a que Django responda
        for i in {1..30}; do
          if curl -s -o /dev/null http://localhost:8000/api/v1/; then
            echo "Django listo"
            break
          fi
          sleep 2
        done

    - name: Start Vite dev server in background
      working-directory: ./frontend
      run: |
        nohup npm run dev -- --host 0.0.0.0 --port 5173 > /tmp/vite.log 2>&1 &
        echo $! > /tmp/vite.pid
        for i in {1..30}; do
          if curl -s -o /dev/null http://localhost:5173/; then
            echo "Vite listo"
            break
          fi
          sleep 2
        done

    - name: Run Playwright E2E suite
      working-directory: ./frontend
      run: npx playwright test --config=playwright.config.e2e-real.ts
      continue-on-error: true  # no bloquear la rama hasta que esté estable

    - name: Upload Playwright report on failure
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-e2e-real
        path: frontend/playwright-report-e2e-real
        retention-days: 14

    - name: Upload Django logs on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: django-log
        path: /tmp/django.log
        retention-days: 7

    - name: Stop background servers
      if: always()
      run: |
        [ -f /tmp/django.pid ] && kill $(cat /tmp/django.pid) || true
        [ -f /tmp/vite.pid ] && kill $(cat /tmp/vite.pid) || true

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy status
      run: echo "Deploy pipeline ready - configure Docker secrets to enable image builds"
