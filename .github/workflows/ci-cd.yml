name: VeriHome CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # Job 1: Backend Tests
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verihome_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: 'True'
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: verihome_test
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      REDIS_URL: redis://localhost:6379
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      FRONTEND_URL: http://localhost:5173
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "setuptools<81"

    - name: Run migrations
      run: python manage.py migrate --noinput

    - name: Run Django tests
      run: python manage.py test --parallel --keepdb
      continue-on-error: true

  # Job 2: Frontend Tests
  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run frontend linting
      working-directory: ./frontend
      run: npx eslint src --ext ts,tsx --report-unused-disable-directives || true

    - name: Run frontend tests
      working-directory: ./frontend
      run: npm run test:coverage || true

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

  # Job 3: Security Scanning
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Run Bandit security scan
      run: |
        pip install bandit
        bandit -r . -x ./venv/,./frontend/,./node_modules/,./.git/ -ll -f json -o bandit-report.json || true

    - name: Run pip-audit check
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt --desc || true

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: bandit-report.json

  # Job 4: Database Migration Check
  migration-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verihome_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: 'True'
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: verihome_test
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "setuptools<81"

    - name: Run migrations
      run: python manage.py migrate --noinput

    - name: Check for missing migrations
      run: python manage.py makemigrations --check || true

  # Job 5: Dependency Security Check
  dependency-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Python dependency audit
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt --desc || true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Frontend dependency check
      working-directory: ./frontend
      run: npm audit --audit-level=critical || true

  # Job 6: Performance Tests (only when backend and frontend pass)
  performance-test:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verihome_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: 'False'
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: verihome_test
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      REDIS_URL: redis://localhost:6379
      FRONTEND_URL: http://localhost:5173
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "setuptools<81"
        pip install locust

    - name: Run migrations
      run: python manage.py migrate --noinput

    - name: Start Django server
      run: |
        python manage.py runserver 8000 &
        sleep 10

    - name: Run performance tests
      run: |
        locust -f performance_tests/locustfile.py --headless -u 10 -r 2 -t 60s --host=http://localhost:8000
      continue-on-error: true

  # Job 7: Deploy (only on main, after all checks pass)
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy status
      run: echo "Deploy pipeline ready - configure Docker secrets to enable image builds"
