name: Lighthouse CI

# Auditoría de performance + accesibilidad + SEO en cada PR que toca
# frontend. El umbral `accessibility >= 0.9` bloquea merge; los otros
# (performance/best-practices/seo) sólo alertan.

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/lighthouse.yml'
  workflow_dispatch: {}

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install Lighthouse CI
        working-directory: ./frontend
        run: npm install --no-save @lhci/cli

      - name: Run Lighthouse CI
        working-directory: ./frontend
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
