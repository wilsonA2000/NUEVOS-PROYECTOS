[pytest]
DJANGO_SETTINGS_MODULE = verihome.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test* *Tests
python_functions = test_*

# Markers declarados para eliminar warnings PytestUnknownMarkWarning
markers =
    slow: tests lentos (>5s). Exclúyelos en dev con -m "not slow".
    integration: tests que tocan servicios externos o DB real.
    e2e: tests que requieren la stack completa corriendo.

# --reuse-db: evita recrear la BD de tests en cada run (mucho más rápido en WSL).
# --cov: mide cobertura sobre todo el repo excluyendo migrations/tests/scripts.
# --cov-fail-under: umbral conservador que crece con el tiempo (bump a 70 luego).
# --cov-report term-missing:skip-covered mantiene el output legible.
addopts =
    --reuse-db
    --cov=.
    --cov-fail-under=60
    --cov-report=term-missing:skip-covered
    --strict-markers
    --tb=short

# Evitar duplicar cobertura sobre artefactos no productivos.
[coverage:run]
omit =
    */migrations/*
    */tests/*
    */tests.py
    */test_*.py
    */__pycache__/*
    */venv/*
    */venv_ubuntu/*
    */node_modules/*
    */frontend/*
    scripts/*
    manage.py
    */settings.py
    */wsgi.py
    */asgi.py

[coverage:report]
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
